# DEPRECATED: Migrated to ECS Fargate. See infra/ecs-task-definition.json
# Keep this file until ECS deployment is verified, then delete.
app = 'rag-agent-kit-api'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = 'data'
  destination = '/app/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
